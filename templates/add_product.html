<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Product</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="topbar">
  <h1>➕ Add Product</h1>
  <a href="/products">← Back</a>
</div>
<div class="container" style="padding-top:16px;">
  <div class="card">
    <form method="POST">
      <label>Product Name</label>
      <input type="text" name="name" placeholder="e.g. Bread" required>
      <label>Category</label>
      <input type="text" name="category" placeholder="e.g. Bakery, Dairy, Groceries">
      <label>Price ($)</label>
      <input type="number" name="price" step="0.01" min="0" placeholder="0.00" required>
      <label>Stock Quantity</label>
      <input type="number" name="stock" min="0" placeholder="0" required>
      <button type="submit" class="btn btn-black">Save Product</button>
      <a href="/products" class="btn btn-light">Cancel</a>
    </form>
  </div>
</div>
</body>
</html>
