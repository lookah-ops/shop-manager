<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Product</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="topbar">
  <h1>✏️ Edit Product</h1>
  <a href="/products">← Back</a>
</div>
<div class="container" style="padding-top:16px;">
  <div class="card">
    <form method="POST">
      <label>Product Name</label>
      <input type="text" name="name" value="{{ product['ProductName'] }}" required>
      <label>Category</label>
      <input type="text" name="category" value="{{ product['Category'] }}">
      <label>Price ($)</label>
      <input type="number" name="price" step="0.01" value="{{ product['Price'] }}" required>
      <label>Stock Quantity</label>
      <input type="number" name="stock" value="{{ product['StockQty'] }}" required>
      <button type="submit" class="btn btn-black">Update Product</button>
      <a href="/products" class="btn btn-light">Cancel</a>
    </form>
  </div>
</div>
</body>
</html>
